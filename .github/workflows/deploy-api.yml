name: Deploy Torgide API

on:
  workflow_dispatch:
  push:
    branches:
      - main
  workflow_call:

jobs:
  deploy-api:
    name: Deploy API to Azure Web App
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set app settings before deploy
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name webapp-torgide-api \
              --resource-group torgide \
              --settings \
                COSMOS_KEY="${{ secrets.COSMOS_KEY }}" \
                COSMOS_URI="${{ secrets.COSMOS_URI }}" \
                COSMOS_DB_NAME="${{ secrets.COSMOS_DB_NAME }}" \
                SCM_DO_BUILD_DURING_DEPLOYMENT="true"

      - name: Zip package for deployment
        run: cd api && zip -r ../release.zip .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webapp-torgide-api'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: release.zip

      - name: Set startup command
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config set \
              --name webapp-torgide-api \
              --resource-group torgide \
              --startup-file "gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 600 --access-logfile '-' --error-logfile '-' main:app"
