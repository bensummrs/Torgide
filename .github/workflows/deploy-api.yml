name: Deploy Torgide API

on:
  workflow_dispatch:
  push:
    branches:
      - main
  workflow_call:

jobs:
  deploy-api:
    name: Deploy API to Azure Web App
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zip package for deployment
        run: cd api && zip -r ../release.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set app settings (env vars)
        uses: azure/appservice-settings@v1
        with:
          app-name: 'webapp-torgide-api'
          app-settings-json: |
            [
              { "name": "COSMOS_KEY",              "value": "${{ secrets.COSMOS_KEY }}" },
              { "name": "COSMOS_URI",              "value": "${{ secrets.COSMOS_URI }}" },
              { "name": "COSMOS_DB_NAME",          "value": "${{ secrets.COSMOS_DB_NAME }}" },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "true" }
            ]

      - name: Set startup command
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config set \
              --name webapp-torgide-api \
              --resource-group torgide \
              --startup-file "gunicorn --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 -w 4 --timeout 600 --access-logfile '-' --error-logfile '-' main:app"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webapp-torgide-api'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: release.zip
