name: Deploy Torgide API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API to Azure Web App
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./api
        run: pip install -r requirements.txt

      - name: Zip package for deployment
        run: zip -r release.zip ./api

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set app settings (env vars)
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          app-settings-json: |
            [
              { "name": "COSMOS_KEY",              "value": "${{ secrets.COSMOS_KEY }}" },
              { "name": "COSMOS_URI",              "value": "${{ secrets.COSMOS_URI }}" },
              { "name": "COSMOS_DB_NAME",          "value": "${{ secrets.COSMOS_DB_NAME }}" },
              { "name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false" }
            ]

      - name: Set startup command
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config set \
              --name ${{ secrets.AZURE_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --startup-file "python -m uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: release.zip
